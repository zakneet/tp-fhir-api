<div class="login-container">
  <div class="login-card">
    <h1>Connexion FHIR API</h1>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          type="text"
          id="username"
          class="form-control"
          [class.is-invalid]="submitted && f['username'].errors"
          formControlName="username"
          placeholder="Entrez votre nom d'utilisateur"
        />
        <div class="error-message" *ngIf="submitted && f['username']?.hasError('required')">
          Le nom d'utilisateur est requis
        </div>
        <div class="error-message" *ngIf="submitted && f['username']?.hasError('minlength')">
          Le nom d'utilisateur doit contenir au moins 3 caractères
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
          formControlName="password"
          placeholder="Entrez votre mot de passe"
        />
        <div class="error-message" *ngIf="submitted && f['password']?.hasError('required')">
          Le mot de passe est requis
        </div>
        <div class="error-message" *ngIf="submitted && f['password']?.hasError('minlength')">
          Le mot de passe doit contenir au moins 6 caractères
        </div>
      </div>

      <div class="error-alert" *ngIf="error">
        {{ error }}
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading"
      >
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
